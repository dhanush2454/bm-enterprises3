async function saveCustomReminder(){
  const msgEl=document.getElementById('crMsg');
  const dateEl=document.getElementById('crDate');
  const timeEl=document.getElementById('crTime');
  const msg=(msgEl?.value||'').trim();
  const date=(dateEl?.value||'').trim();
  const dueTime=(timeEl?.value||'').trim();
  if(!msg)return toast('Enter a reminder message','err');
  if(!CU?.id)return toast('Not logged in','err');

  const id=newUUID();
  const newReminder={id,userId:CU.id,cc:cc(),msg,text:msg,date,dueDate:date,dueTime,done:false,created:nowISO()};
  const all=gl('customReminders');
  all.push(newReminder);
  sl('customReminders',all);
  closeModal();

  // PHASE 1: persist to Supabase FIRST, before navigating/rendering.
  // The Reminders page triggers a background cloud sync on every visit,
  // which OVERWRITES the local cache with whatever Supabase currently
  // has. If we navigated there before this insert finished, a sync
  // could complete first and wipe out the reminder we just added
  // locally — making it flash and vanish. Waiting here closes that gap.
  const dueAtISO=date?new Date(date+'T'+(dueTime||'09:00')+':00').toISOString():null;
  try{
    const{error:insErr}=await sb.from('custom_reminders').insert({
      id,user_id:CU.id,company_code:cc(),msg,due_at:dueAtISO||new Date().toISOString(),done:false
    });
    if(insErr){
      console.warn('reminder cloud insert failed',insErr);
      toast('Saved on this device only — cloud sync failed: '+(insErr.message||'unknown error'),'err');
    }else{
      toast('Reminder saved ✓','ok');
    }
  }catch(e){
    console.warn('reminder cloud insert error',e);
    toast('Saved on this device only — check your connection','err');
  }

  updateReminderBadge();
  goPage('notifications',{},true);

  // Schedule the EXACT-time push via OneSignal (can safely happen after
  // navigation — it doesn't affect what's shown in the local list).
  if(dueAtISO){
    try{
      // Schedule the push to fire at the exact date/time the user picked —
      // this is what makes it arrive on time and on every linked device,
      // even if all of them are closed when it fires.
      const resp=await fetch(VERCEL_API_BASE+'/api/schedule-reminder',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({userId:CU.id,title:'⏰ Reminder',message:msg,sendAtISO:dueAtISO,reminderId:id})
      });
      const data=await resp.json().catch(()=>null);
      if(data?.onesignalId){
        await sb.from('custom_reminders').update({onesignal_notification_id:data.onesignalId}).eq('id',id);
        // keep local cache in sync too
        const updated=gl('customReminders');
        const idx=updated.findIndex(r=>r.id===id);
        if(idx>=0){updated[idx].onesignalId=data.onesignalId;sl('customReminders',updated);}
      }
    }catch(e){console.warn('Push scheduling failed (offline?)',e);}
  }
}

async function toggleCustomRem(rid){
  const all=gl('customReminders');
  const idx=all.findIndex(r=>r.id===rid);
  if(idx<0)return;
  all[idx].done=!all[idx].done;
  all[idx].doneAt=all[idx].done?nowISO():null;
  sl('customReminders',all);
  updateReminderBadge();

  // Finish the cloud write BEFORE navigating — navigating triggers a
  // background sync that overwrites the local cache with Supabase's
  // current data; if that sync ran before this update finished, it
  // would show the OLD done/pending state for a moment (or permanently
  // if the timing is unlucky), undoing what was just tapped.
  try{
    await sb.from('custom_reminders').update({done:all[idx].done}).eq('id',rid);
    // If marked done before it fired, cancel the scheduled push so it
    // doesn't show up later for something already handled.
    if(all[idx].done&&all[idx].onesignalId){
      fetch(VERCEL_API_BASE+'/api/cancel-reminder',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({onesignalId:all[idx].onesignalId})}).catch(()=>{});
    }
  }catch(e){console.warn('toggle reminder cloud sync failed',e);}

  goPage('notifications',{},true);
}

async function delCustomRem(rid){
  if(!confirm('Delete this reminder?'))return;
  const existing=gl('customReminders').find(r=>r.id===rid);
  sl('customReminders',gl('customReminders').filter(r=>r.id!==rid));
  updateReminderBadge();
  toast('Reminder deleted','info');

  // Same reasoning as toggleCustomRem above: finish the cloud delete
  // before navigating, so a background sync can't bring the
  // just-deleted reminder back from Supabase before the delete lands.
  try{
    await sb.from('custom_reminders').delete().eq('id',rid);
    if(existing?.onesignalId){
      fetch(VERCEL_API_BASE+'/api/cancel-reminder',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({onesignalId:existing.onesignalId})}).catch(()=>{});
    }
  }catch(e){console.warn('delete reminder cloud sync failed',e);}

  goPage('notifications',{},true);
}

function saveAcc(editId=''){
  const mid=val('acM'),date=val('acD'),desc=val('acDesc');
  if(!mid||!date||!desc)return toast('Machine, date and description required','err');
  const opId=val('acUid'),loc=val('acLoc'),cost=val('acC')||'0',ic2=val('acIC')||'0';
  const sev=val('acSev')||'minor',action=val('acAct'),witnesses=val('acWit');
  const photos=getPH('accPh');
  const newIds=photos.map(function(){return newPhId();});
  Promise.all(photos.map(function(data,i){return PhotoDB.put(newIds[i],data);})).then(function(){
    const all=gl('accidents');
    const newAccId=uid();
    if(editId){
      const idx=all.findIndex(function(a){return a.id===editId;});
      if(idx>-1){
        (all[idx].photoIds||[]).forEach(function(id){PhotoDB.del(id).catch(function(){});});
        Object.assign(all[idx],{mid,uid:opId,date,desc,location:loc,cost,injuryCost:ic2,severity:sev,action,witnesses,photoIds:newIds,updatedAt:nowISO()});
        if(CU.role==='manager')mgrNotify('edited accident record',desc+(loc?' @ '+loc:''));
      }
    } else {
      all.push({id:newAccId,mid,uid:opId,date,desc,location:loc,cost,injuryCost:ic2,severity:sev,action,witnesses,photoIds:newIds,resolved:false,count:1,cc:cc(),created:nowISO()});
      if(CU.role==='manager')mgrNotify('logged accident',desc+(loc?' @ '+loc:''));
    }
    sl('accidents',all);delete PM['accPh'];
    // Auto-create expense entry for accident cost
    const totalAccCost=(parseFloat(cost)||0)+(parseFloat(ic2)||0);
    if(totalAccCost>0){
      const expAll=gl('expenses');
      const accRef=editId||newAccId;
      if(editId){
        const filtered=expAll.filter(function(e){return e.accRef!==editId;});
        filtered.push({id:uid(),type:'Accident',amt:String(totalAccCost),date:date,
          desc:'Accident: '+desc+(loc?' @ '+loc:''),photoIds:[],accRef:accRef,cc:cc(),created:nowISO()});
        sl('expenses',filtered);
      } else {
        expAll.push({id:uid(),type:'Accident',amt:String(totalAccCost),date:date,
          desc:'Accident: '+desc+(loc?' @ '+loc:''),photoIds:[],accRef:accRef,cc:cc(),created:nowISO()});
        addExpTotal(totalAccCost);
        sl('expenses',expAll);
      }
    }
    closeModal();toast('Accident logged','ok');goPage('accident');
  }).catch(function(err){console.error('saveAcc error:',err);closeModal();toast('Accident logged','ok');goPage('accident');});
}

function delAcc(id){
  if(!confirm('Delete this accident record?'))return;
  const a=gl('accidents').find(x=>x.id===id);
  if(CU.role==='manager'&&a)mgrAlert('accident record',a.desc||fmtD(a.date)||id);
  sl('accidents',gl('accidents').filter(a=>a.id!==id));
  sl('expenses',gl('expenses').filter(e=>e.accRef!==id));
  toast('Deleted','info');goPage('accident');
}

/* ── ARCHIVE with Restore ── */
function pgArchive(){
  const sf=getSF('archive');const q=sf.query.toLowerCase();
  const sfArchType=sf.filters.type||'';
  const sfArchFrom=sf.filters.dateFrom||'';
  const sfArchTo=sf.filters.dateTo||'';

  // Regular archived items (olddata)
  const all=AOD().filter(d=>{
    if(q&&!(d.data.name||d.data.title||'').toLowerCase().includes(q))return false;
    if(sfArchType&&sfArchType!=='ghost'&&d.type!==sfArchType)return false;
    if(sfArchType==='ghost')return false;
    if(sfArchFrom&&d.archivedAt&&d.archivedAt.slice(0,10)<sfArchFrom)return false;
    if(sfArchTo&&d.archivedAt&&d.archivedAt.slice(0,10)>sfArchTo)return false;
    return true;
  }).sort((a,b)=>new Date(b.archivedAt)-new Date(a.archivedAt));
  const grp={job:[],machine:[],operator:[],client:[]};
  all.forEach(d=>{if(grp[d.type])grp[d.type].push(d);});

  // Ghost jobs (deleted completed jobs — kept for financial records)
  const ghosts=(sfArchType&&sfArchType!=='ghost')?[]:AGJ().sort((a,b)=>new Date(b.ghostedAt||0)-new Date(a.ghostedAt||0)).filter(g=>{
    if(q&&!(g.title||'').toLowerCase().includes(q)&&!(g.client||'').toLowerCase().includes(q)&&!(mById(g.mid)?.name||'').toLowerCase().includes(q))return false;
    if(sfArchFrom&&g.ghostedAt&&g.ghostedAt.slice(0,10)<sfArchFrom)return false;
    if(sfArchTo&&g.ghostedAt&&g.ghostedAt.slice(0,10)>sfArchTo)return false;
    return true;

      <option value="machine" ${sf.filters.type==='machine'?'selected':''}>Machines</option>
      <option value="operator" ${sf.filters.type==='operator'?'selected':''}>Machine Specialists</option>
    </select></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:.4rem">
    <div class="fg" style="margin:0"><label class="fl">From</label>
      <input class="fi" type="date" value="${sf.filters.dateFrom||''}" onchange="setSFFilter('archive','dateFrom',this.value)"/></div>
    <div class="fg" style="margin:0"><label class="fl">To</label>
      <input class="fi" type="date" value="${sf.filters.dateTo||''}" onchange="setSFFilter('archive','dateTo',this.value)"/></div>
  </div>
  <button class="btn bD bSm" style="margin-top:.4rem" onclick="clearSF('archive')">✕ Clear</button>
</div>`:''}`;

/* Restore a ghost completed job back to active jobs */
function restoreGhostJob(jid){
  const ghosts=gl('ghostJobs');
  const g=ghosts.find(j=>j.id===jid);
  if(!g)return toast('Job not found','err');
  // Put back into live jobs
  const jobs=gl('jobs');
  if(jobs.find(j=>j.id===g.id)){
    toast('A job with this ID already exists','err');return;
  }
  const restored={...g};
  delete restored.ghostedAt;
  restored.restoredAt=nowISO();
  jobs.push(restored);
  sl('jobs',jobs);
  sl('ghostJobs',ghosts.filter(j=>j.id!==jid));
  toast('Completed job restored ✓','ok');
  goPage('completed');
}

/* Permanently delete a ghost job (removes from financial ghost store too) */
function permDelGhost(jid){
  if(!confirm('Permanently delete? This will also remove the financial ghost record.'))return;
  sl('ghostJobs',gl('ghostJobs').filter(j=>j.id!==jid));
  toast('Permanently deleted','info');
  goPage('archive');
}

function permDel(id){
  if(!confirm('Permanently delete?'))return;
  sl('olddata',gl('olddata').filter(d=>d.id!==id));
  toast('Deleted permanently','info');goPage('archive');
}

function clearArchiveFull(){
  if(!confirm('Clear ALL archive and deleted jobs permanently?'))return;
  sl('olddata',gl('olddata').filter(d=>d.cc!==cc()));
  sl('ghostJobs',gl('ghostJobs').filter(j=>j.cc!==cc()));
  toast('Cleared','info');goPage('archive');
}
function clearArchive(){clearArchiveFull();}

function restoreItem(archId,type){
  const item=gl('olddata').find(d=>d.id===archId);
  if(!item)return toast('Item not found in archive','err');
  const restored={...item.data,restoredAt:nowISO()};
  if(!restored.cc)restored.cc=cc();

  if(type==='job'){
    if(!restored.status)restored.status='pending';
    const all=gl('jobs');
    if(all.find(j=>j.id===restored.id))restored.id=uid();
    // DO NOT restore invoices/expenses — they were never deleted, only the job record was archived
    // invoices linked by jid still exist in invoices store
    all.push(restored);sl('jobs',all);
    toast(`Job restored as "${restored.status}" ✓`,'ok');
    sl('olddata',gl('olddata').filter(d=>d.id!==archId));
    goPage(restored.status==='completed'?'completed':'jobs');
    return;
  } else if(type==='machine'){
    const all=gl('machines');
    if(all.find(m=>m.id===restored.id))restored.id=uid();
    all.push(restored);sl('machines',all);
    toast('Machine restored ✓','ok');
  } else if(type==='operator'){
    const all=gl('users');
    if(all.find(u=>u.id===restored.id))restored.id=uid();
    all.push(restored);sl('users',all);
    toast('Operator restored ✓','ok');
  } else if(type==='client'){
    const all=gl('clients');
    if(all.find(c=>c.id===restored.id))restored.id=uid();
    all.push(restored);sl('clients',all);
    toast('Client restored ✓','ok');
    sl('olddata',gl('olddata').filter(d=>d.id!==archId));
    goPage('clients');
    return;
  }
  sl('olddata',gl('olddata').filter(d=>d.id!==archId));
  goPage('archive');
}

function restoreJob(archId){restoreItem(archId,'job');}

  if(k==='C'){_op6='';op6Render();}
  else if(k==='↵'){op6Enter();}
  else if(_op6.length<6){_op6+=String(k);op6Render();}
}
function op6Render(){
  const g=$('op6G');if(!g)return;
  g.innerHTML='';
  for(let i=0;i<6;i++){const d=document.createElement('div');d.className='op6-box'+(_op6[i]?' filled':'');d.textContent=_op6[i]||'';g.appendChild(d);}

  if(_op6.length!==6)return toast('Enter full 6-digit code','err');
  const op=gl('users').find(u=>u.companyCode===cc()&&u.role==='operator'&&u.op6===_op6);
  if(!op)return toast('Invalid specialist code','err');
  enterOpView(op.id);_op6='';
}

/* ── AUTO-1: AUTO INVOICE GENERATOR ──
   When a job is completed and has logHours + rate, auto-draft invoice */
function autoGenInvoice(jobId){
  const j=jById(jobId);
  if(!j||!j.logHours||!j.rate)return null;
  if(iByJob(jobId))return null; // already has invoice
  const hours=parseFloat(j.logHours)||0;
  const rate=parseFloat(j.rate)||0;
  const amt=hours*rate;
  const inv={
    id:uid(),cc:cc(),jid:jobId,
    client:j.client||'',
    amt:amt.toFixed(0),
    gst:'18',
    ps:'unpaid',
    date:tod(),
    desc:`Auto-generated: ${j.title} — ${hours}h × ₹${rate}/hr`,
    autoGenerated:true,
    created:nowISO()
  };
  const all=gl('invoices');all.push(inv);sl('invoices',all);
  AAll().filter(u=>u.role==='admin').forEach(a=>
    addReminder(a.id,`Auto-invoice ₹${fmtC(amt)} drafted for "${j.title}"`)
  );
  return inv;
}

/* ── AUTO-2: SMART MACHINE ASSIGNMENT ──
   Returns ranked list of free machines for a job type */
function getSmartMachineRank(){
  const jj=AJ();
  const mm=AM();
  const wMids=new Set(jj.filter(j=>j.status==='ongoing').map(j=>j.mid));
  const mMids=new Set(AMn().map(m=>m.mid));
  return mm.map(m=>{
    const isBusy=wMids.has(m.id);
    const isMaint=mMids.has(m.id);
    const jobsDone=jj.filter(j=>j.mid===m.id&&j.status==='completed').length;
    const totalHrs=jj.filter(j=>j.mid===m.id).reduce((a,j)=>a+parseFloat(j.logHours||0),0);
    const lastJob=jj.filter(j=>j.mid===m.id).sort((a,b)=>b.created>a.created?1:-1)[0];
    const daysSinceUsed=lastJob?Math.floor((Date.now()-new Date(lastJob.created))/(1000*60*60*24)):999;
    let score=100;
    if(isBusy)score=0;
    else if(isMaint)score=5;
    else{score-=Math.min(totalHrs/10,30); score+=Math.min(jobsDone*2,20); if(daysSinceUsed>14)score-=10;}
    return{...m,score:Math.max(0,Math.round(score)),isBusy,isMaint,jobsDone,totalHrs:totalHrs.toFixed(0),daysSinceUsed};
  }).sort((a,b)=>b.score-a.score);
}

/* ── AUTO-3: MACHINE HEALTH SCORE ──
   Computes 0–100 health from inspections, maintenance, accidents, hours */
function getMachineHealth(machineId){
  const jj=AJ().filter(j=>j.mid===machineId);
  const inspections=gl('inspections').filter(i=>i.mid===machineId&&i.cc===cc());
  const accs=gl('accidents').filter(a=>a.mid===machineId&&a.cc===cc());
  const maint=AMn().filter(m=>m.mid===machineId);
  const totalHrs=jj.reduce((a,j)=>a+parseFloat(j.logHours||0),0);
  let score=100;
  // Deduct for accidents
  score-=Math.min(accs.length*15,40);
  // Deduct for overdue maintenance
  const today=tod();
  maint.forEach(m=>{if(m.next&&m.next<today)score-=20;});
  // Deduct for high hours without service
  if(totalHrs>500)score-=15;
  else if(totalHrs>250)score-=8;
  // Boost for recent good inspections
  const recent=inspections.slice(-3);
  if(recent.length){
    const passRate=recent.reduce((a,i)=>a+(i.items.filter(Boolean).length/Math.max(i.items.length,1)),0)/recent.length;
    score+=Math.round(passRate*15);
  }
  score=Math.max(0,Math.min(100,Math.round(score)));
  const label=score>=80?'Good':score>=55?'Fair':score>=30?'Poor':'Critical';
  const col=score>=80?'G':score>=55?'A':score>=30?'O':'R';
  return{score,label,col,totalHrs:totalHrs.toFixed(0),accCount:accs.length,maintCount:maint.length,inspCount:inspections.length};
}

/* ── AUTO-4: IDLE MACHINE ALERT ──
   Flags machines unused for N+ days */
function getIdleMachines(days=7){
  const jj=AJ();
  const wMids=new Set(jj.filter(j=>j.status==='ongoing').map(j=>j.mid));
  return AM().filter(m=>{
    if(wMids.has(m.id))return false;
    const last=jj.filter(j=>j.mid===m.id).sort((a,b)=>b.created>a.created?1:-1)[0];
    if(!last)return true;
    const daysSince=Math.floor((Date.now()-new Date(last.created))/(1000*60*60*24));
    return daysSince>=days;
  }).map(m=>{
    const last=jj.filter(j=>j.mid===m.id).sort((a,b)=>b.created>a.created?1:-1)[0];
    const daysSince=last?Math.floor((Date.now()-new Date(last.created))/(1000*60*60*24)):999;
    return{...m,daysSince};
  }).sort((a,b)=>b.daysSince-a.daysSince);
}

/* ── AUTO-5: OPERATOR PERFORMANCE SCORE ──
   Auto-rates each operator based on jobs, hours, inspections, accidents */
function getOpPerformance(opId){
  // Include ghost (deleted) jobs so operator history never shrinks
  const jj=[...AJ().filter(j=>j.oid===opId),...AGJ().filter(j=>j.oid===opId)];
  const done=jj.filter(j=>j.status==='completed');
  const inspections=gl('inspections').filter(i=>i.uid===opId&&i.cc===cc());
  const accs=gl('accidents').filter(a=>a.uid===opId&&a.cc===cc());
  const totalHrs=jj.reduce((a,j)=>a+parseFloat(j.logHours||0),0);
  const completionRate=jj.length?Math.round(done.length/jj.length*100):0;
  let score=50;
  score+=Math.min(completionRate/2,30);
  score+=Math.min(inspections.length*3,15);
  score-=Math.min(accs.length*10,30);
  score+=Math.min(totalHrs/50,10);
  score=Math.max(0,Math.min(100,Math.round(score)));
  const stars=Math.round(score/20);
  return{score,stars,completionRate,totalHrs:totalHrs.toFixed(0),totalJobs:jj.length,inspCount:inspections.length,accCount:accs.length};
}

/* ── SMART INSIGHTS ENGINE ──
   Generates actionable alerts for admin dashboard */
function getSmartInsights(){
  const insights=[];
  const jj=AJ(),ii=AI(),ee=AE();
  const today=tod();

  // Unpaid invoices older than 7 days
  const oldUnpaid=ii.filter(i=>i.ps!=='paid'&&i.date&&Math.floor((Date.now()-new Date(i.date))/(1000*60*60*24))>7);
  if(oldUnpaid.length)insights.push({type:'warn',icon:'₹',msg:`${oldUnpaid.length} invoice${oldUnpaid.length>1?'s':''} unpaid for 7+ days`,action:'invoices',actionLbl:'View Invoices'});

  // Jobs stuck in pending for 3+ days
  const stalePending=jj.filter(j=>j.status==='pending'&&j.created&&Math.floor((Date.now()-new Date(j.created))/(1000*60*60*24))>=3);
  if(stalePending.length)insights.push({type:'warn',icon:'⏳',msg:`${stalePending.length} job${stalePending.length>1?'s':''} pending for 3+ days — assign now`,action:'jobs',actionLbl:'View Jobs'});

  // Idle machines
  const idle=getIdleMachines(7);
  if(idle.length)insights.push({type:'info',icon:'🚜',msg:`${idle.length} machine${idle.length>1?'s':''} idle for 7+ days`,action:'machines',actionLbl:'View Fleet'});

  // Completed jobs missing invoice
  const noInv=jj.filter(j=>j.status==='completed'&&!iByJob(j.id)&&j.logHours&&j.rate);
  if(noInv.length)insights.push({type:'ok',icon:'📄',msg:`${noInv.length} completed job${noInv.length>1?'s':''} ready for auto-invoice`,action:'autoInvAll',actionLbl:'Generate All'});

  // Overdue maintenance
  const overdueMaint=AMn().filter(m=>m.next&&m.next<today);
  if(overdueMaint.length)insights.push({type:'err',icon:'🔧',msg:`${overdueMaint.length} machine${overdueMaint.length>1?'s':''} overdue for maintenance`,action:'maintenance',actionLbl:'View Maintenance'});

  // Profit warning (include salary in expenses)
  const income=ii.filter(i=>i.ps==='paid').reduce((a,i)=>a+invRevenue(i),0);
  const tExpW=ee.reduce((a,e)=>a+(+e.amt||0),0)+gl('salaryPayments').filter(p=>p.cc===cc()&&p.status==='paid').reduce((a,p)=>a+(+p.amount||0),0);
  if(income>0&&tExpW/income>0.8)insights.push({type:'err',icon:'📉',msg:`Expenses are ${Math.round(tExpW/income*100)}% of income — margin critically low`,action:'reports',actionLbl:'View Reports'});

  return insights;
}

function qkStatusUp(jid){

function pgCalc(){
  return`<div class="ph"><div><h1 class="pt">${t('calculator')}</h1></div></div>
<div class="card" style="margin-bottom:.75rem">
  <div class="fl" style="margin-bottom:.38rem">Auto-calculate from time</div>
  <div class="row"><div class="fg"><label class="fl">Start</label><input class="fi" id="cTs" type="time" oninput="calcFT()"/></div>
    <div class="fg"><label class="fl">End</label><input class="fi" id="cTe" type="time" oninput="calcFT()"/></div></div>
  <div class="divLine"></div>
  <div class="row"><div class="fg"><label class="fl">${t('hours')}</label><input class="fi" id="cH" type="number" value="8" min="0" oninput="calcUpdate()"/></div>
    <div class="fg"><label class="fl">Minutes</label><input class="fi" id="cM" type="number" value="0" min="0" max="59" oninput="calcUpdate()"/></div></div>
  <div class="fg"><label class="fl">${t('rate')}</label><input class="fi" id="cR" type="number" value="2500" min="0" oninput="calcUpdate()"/></div>
  <div class="row"><div class="fg"><label class="fl">Operator (₹)</label><input class="fi" id="cOp" type="number" value="0" oninput="calcUpdate()"/></div>
    <div class="fg"><label class="fl">Fuel (₹)</label><input class="fi" id="cF" type="number" value="0" oninput="calcUpdate()"/></div></div>
  <div class="fg"><label class="fl">${t('margin')}</label><input class="fi" id="cP" type="number" value="20" min="0" max="100" oninput="calcUpdate()"/></div>
</div>
<div class="card" style="margin-bottom:.75rem">
  ${[['Duration','crDur','8h 0m',''],['Machine Cost','crMc','₹0',''],['+ Operator','crOp','₹0',''],['+ Fuel','crFu','₹0',''],['Total Cost','crCost','₹0','font-weight:600'],['Margin','crMa','₹0','color:var(--G)']].map(([l,id,d,st])=>`<div style="display:flex;justify-content:space-between;padding:.32rem 0;font-size:.875rem;border-bottom:1px solid var(--b1)"><span style="color:var(--t2)">${l}</span><span id="${id}" style="${st}">${d}</span></div>`).join('')}
  <div style="display:flex;justify-content:space-between;align-items:center;padding:.4rem 0">
    <span style="font-weight:600">${t('suggestedPrice')}</span>
    <span id="crP" style="font-family:var(--fd);font-size:1.875rem;font-weight:800;color:var(--A)">₹0</span>
  </div>
</div>
<div style="display:flex;gap:.4rem"><button class="btn bG bSm" onclick="calcReset()">Reset</button><button class="btn bG bSm" onclick="calcCopy()">Copy</button></div>`;
}
function calcFT(){
  const ts=$('cTs')?.value||'',te=$('cTe')?.value||'';if(!ts||!te)return;
  const[sh,sm]=ts.split(':').map(Number),[eh,em]=te.split(':').map(Number);
  let mins=(eh*60+em)-(sh*60+sm);if(mins<0)mins+=1440;
  const h=$('cH'),m=$('cM');if(h)h.value=Math.floor(mins/60);if(m)m.value=mins%60;calcUpdate();
}
function calcUpdate(){
  const h=Math.max(0,parseFloat($('cH')?.value)||0),m=Math.max(0,Math.min(59,parseFloat($('cM')?.value)||0));
  const r=Math.max(0,parseFloat($('cR')?.value)||0),op=Math.max(0,parseFloat($('cOp')?.value)||0);
  const f=Math.max(0,parseFloat($('cF')?.value)||0),pct=Math.max(0,Math.min(100,parseFloat($('cP')?.value)||0));
  const tH=h+m/60,mc=tH*r,cost=mc+op+f,ma=cost*pct/100,price=cost+ma;
  const set=(id,v)=>{const e=$(id);if(e)e.textContent=v;};
  set('crDur',`${h}h ${m}m`);set('crMc',fmtC(mc));set('crOp',fmtC(op));set('crFu',fmtC(f));
  set('crCost',fmtC(cost));set('crMa',fmtC(ma));set('crP',fmtC(price));
}
function calcReset(){const def={cH:'8',cM:'0',cR:'2500',cOp:'0',cF:'0',cP:'20'};Object.entries(def).forEach(([k,v])=>{const e=$(k);if(e)e.value=v;});['cTs','cTe'].forEach(id=>{const e=$(id);if(e)e.value='';});calcUpdate();}
function calcCopy(){const p=$('crP')?.textContent||'—',c=$('crCost')?.textContent||'—';navigator.clipboard?.writeText(`BM Enterprises\nSuggested Price: ${p}\nTotal Cost: ${c}`).then(()=>toast('Copied','ok')).catch(()=>toast(p,'info'));}

function previewVar(varName,val){
  document.documentElement.style.setProperty(varName,val);
  // Also update derived alpha vars for accent colour
  if(varName==='--A'){
    const hex=val.replace('#','');
    const r=parseInt(hex.slice(0,2),16),g2=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
    document.documentElement.style.setProperty('--Abg',`rgba(${r},${g2},${b},.10)`);
    document.documentElement.style.setProperty('--Adim',`rgba(${r},${g2},${b},.05)`);
    document.documentElement.style.setProperty('--Ad',val);
  }
  if(varName==='--R'){
    const hex=val.replace('#','');
    const r=parseInt(hex.slice(0,2),16),g2=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
    document.documentElement.style.setProperty('--Rbg',`rgba(${r},${g2},${b},.10)`);
  }
  if(varName==='--G'){
    const hex=val.replace('#','');
    const r=parseInt(hex.slice(0,2),16),g2=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
    document.documentElement.style.setProperty('--Gbg',`rgba(${r},${g2},${b},.10)`);
  }
  if(varName==='--B'){
    const hex=val.replace('#','');
    const r=parseInt(hex.slice(0,2),16),g2=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
    document.documentElement.style.setProperty('--Bbg',`rgba(${r},${g2},${b},.10)`);
  }
}

function previewFont(fontVal){
  document.documentElement.style.setProperty('--fb',fontVal);
  document.body.style.fontFamily=fontVal;
}

function applyPreset(idx){
  const p=THEME_PRESETS[idx];
  if(!p)return;

  toast(`Preset "${p.name}" applied — tap Save to keep`,'info');
}

function saveTheme(){
  // Collect all current custom CSS vars from inputs
  const vars={};
  [['--A','#F59E0B'],['--G','#22c55e'],['--R','#ef4444'],['--B','#3b82f6'],['--O','#f97316'],['--P','#a855f7']].forEach(([v,def])=>{
    const cur=document.documentElement.style.getPropertyValue(v)||def;
    vars[v]=cur;
    // Store derived bg colours
    if(v==='--A'){const hex=cur.replace('#','');const r=parseInt(hex.slice(0,2),16),g2=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
      vars['--Abg']=`rgba(${r},${g2},${b},.10)`;vars['--Adim']=`rgba(${r},${g2},${b},.05)`;vars['--Ad']=cur;}
    if(v==='--R'){const hex=cur.replace('#','');const r=parseInt(hex.slice(0,2),16),g2=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);vars['--Rbg']=`rgba(${r},${g2},${b},.10)`;}
    if(v==='--G'){const hex=cur.replace('#','');const r=parseInt(hex.slice(0,2),16),g2=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);vars['--Gbg']=`rgba(${r},${g2},${b},.10)`;}
    if(v==='--B'){const hex=cur.replace('#','');const r=parseInt(hex.slice(0,2),16),g2=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);vars['--Bbg']=`rgba(${r},${g2},${b},.10)`;}

function pgSalary(params={}){
  const ops=AOps();
  const selOp=params.opId||ops[0]?.id||'';
  const op=selOp?ops.find(o=>o.id===selOp)||ops[0]:ops[0];
  if(!ops.length)return`<div class="ph"><h1 class="pt">Salary</h1></div>${empty('No Machine Specialists','Add machine specialists first to track salary.')}`;

  const salConf=gl('salaryConf').find(s=>s.opId===op?.id&&s.cc===cc())||{type:'daily',amount:0};
  const payments=gl('salaryPayments').filter(p=>p.opId===op?.id&&p.cc===cc()).sort((a,b)=>new Date(b.date)-new Date(a.date));

  // Calculate earnings from job logs
  const opJobs=AJC().filter(j=>(j.oid===op?.id||effectiveOp(j)===op?.id)&&j.logHours);
  const totalHrs=opJobs.reduce((a,j)=>a+parseFloat(j.logHours||0),0);
  const workDays=new Set(opJobs.map(j=>j.loggedAt?.split('T')[0]||j.start)).size;

  // Calculate expected salary
  let expected=0;
  if(salConf.amount>0){
    if(salConf.type==='daily')expected=workDays*salConf.amount;
    else if(salConf.type==='hourly')expected=totalHrs*salConf.amount;
    else if(salConf.type==='weekly')expected=Math.ceil(workDays/6)*salConf.amount;
    else if(salConf.type==='monthly')expected=salConf.amount; // fixed monthly
    else if(salConf.type==='custom')expected=salConf.amount;
  }
  const totalPaid=payments.filter(p=>p.status==='paid').reduce((a,p)=>a+(+p.amount||0),0);
  const balance=expected-totalPaid;

  const mon=new Date();
  const thisMonth=`${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,'0')}`;
  const monthJobs=opJobs.filter(j=>(j.loggedAt||j.start||'').startsWith(thisMonth));
  const monthHrs=monthJobs.reduce((a,j)=>a+parseFloat(j.logHours||0),0);
  const monthDays=new Set(monthJobs.map(j=>j.loggedAt?.split('T')[0]||j.start)).size;

  return`<div class="ph"><div><h1 class="pt">Salary</h1><p class="ps">Operator pay tracking</p></div>
  <button class="btn bP bSm" onclick="openSalaryConf('${op?.id}')">⚙ Configure</button></div>

    ${ops.map(o=>`<option value="${o.id}" ${o.id===op?.id?'selected':''}>${esc(o.name)}</option>`).join('')}

</div>

    <div style="font-size:.62rem;color:var(--t2);text-transform:uppercase;letter-spacing:.07em">Expected</div>
    <div style="font-family:var(--fd);font-size:1.5rem;font-weight:800;color:var(--G)">${fmtC(expected)}</div>
    <div style="font-size:.7rem;color:var(--t3)">${salConf.type==='daily'?salConf.amount+'/day':salConf.type==='hourly'?salConf.amount+'/hr':salConf.type==='weekly'?salConf.amount+'/week':'Fixed'}</div>
  </div>
  <div style="background:var(--${balance>0?'R':'G'}bg);border:1.5px solid rgba(${balance>0?'239,68,68':'34,197,94'},.2);border-radius:var(--r12);padding:.8rem;text-align:center">
    <div style="font-size:.62rem;color:var(--t2);text-transform:uppercase;letter-spacing:.07em">${balance>0?'Balance Due':'Settled'}</div>
    <div style="font-family:var(--fd);font-size:1.5rem;font-weight:800;color:var(--${balance>0?'R':'G'})">${fmtC(Math.abs(balance))}</div>
    <div style="font-size:.7rem;color:var(--t3)">Paid: ${fmtC(totalPaid)}</div>
  </div>
</div>

  <div class="sTitle">This Month — ${mon.toLocaleDateString('en-IN',{month:'long',year:'numeric'})}</div>

/* ══════════════════════════════════════════════════
   ATTENDANCE SYSTEM
   Mark present/absent/half-day · View calendar · Summary

function pgAttendance(params={}){
  const ops=AOps();
  const selOp=params.opId||ops[0]?.id||'';
  const op=ops.find(o=>o.id===selOp)||ops[0];
  if(!ops.length)return`<div class="ph"><h1 class="pt">Attendance</h1></div>${empty('No Machine Specialists','Add machine specialists first.')}`;

  const now=new Date();
  const viewYear=params.year||now.getFullYear();
  const viewMonth=params.month!=null?+params.month:now.getMonth();
  const drillDate=params.drillDate||null; // drilled-down date

  const att=gl('attendance').filter(a=>a.opId===op?.id&&a.cc===cc());
  const attMap={};att.forEach(a=>attMap[a.date]=a);

  const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
  const firstDay=new Date(viewYear,viewMonth,1).getDay();
  const monthLabel=new Date(viewYear,viewMonth,1).toLocaleDateString('en-IN',{month:'long',year:'numeric'});

  const monthPrefix=`${viewYear}-${String(viewMonth+1).padStart(2,'0')}`;
  const monthAtts=att.filter(a=>a.date.startsWith(monthPrefix));

  // STATUS DEFINITIONS — clear explanation
  // present = came to work (full day)
  // half    = worked half day
  // noshow  = did not come, no reason given (was "absent")
  // leave   = did not come, but informed in advance / approved
  const STATUS_COLORS={present:'var(--G)',half:'var(--A)',noshow:'var(--R)',leave:'var(--B)'};
  const STATUS_BG={present:'var(--Gbg)',half:'var(--Abg)',noshow:'var(--Rbg)',leave:'var(--Bbg)'};
  const STATUS_LABELS={present:'P',half:'½',noshow:'NS',leave:'L'};
  const STATUS_NAMES={present:'Present',half:'Half Day',noshow:'No Show',leave:'Leave'};
  // backward compat: treat old 'absent' records as 'noshow'
  const normStatus=s=>s==='absent'?'noshow':s;

  const present=monthAtts.filter(a=>normStatus(a.status)==='present').length;
  const halfDay=monthAtts.filter(a=>normStatus(a.status)==='half').length;
  const noshow=monthAtts.filter(a=>normStatus(a.status)==='noshow').length;
  const leave=monthAtts.filter(a=>normStatus(a.status)==='leave').length;

  // Hours per status from job logs this month

const STATUS_NAMES={present:'Present',half:'Half Day',noshow:'No Show',leave:'Leave',absent:'No Show'};

function saveAttendance(opId,date,status){
  const note=val('attNote')||'';
  const shiftIn=document.getElementById('attIn')?.value||'';
  const shiftOut=document.getElementById('attOut')?.value||'';
  const all=gl('attendance');
  // Calculate hours and handle midnight rollover
  let hours=0;
  let nextDayHours=0;
  let nextDate='';
  if(shiftIn&&shiftOut){
    const [inH,inM]=shiftIn.split(':').map(Number);
    const [outH,outM]=shiftOut.split(':').map(Number);
    const inMins=inH*60+inM;
    let outMins=outH*60+outM;
    if(outMins<=inMins){
      // Shift crosses midnight
      const todayMins=1440-inMins; // mins until midnight
      nextDayMins=outMins;         // mins into next day
      hours=todayMins/60;
      nextDayHours=nextDayMins/60;
      const nd=new Date(date+'T00:00:00');nd.setDate(nd.getDate()+1);
      nextDate=nd.toISOString().split('T')[0];
    } else {
      hours=(outMins-inMins)/60;
    }
  }
  const entry={status,note,shiftIn,shiftOut,autoMarked:false};
  if(hours>0)entry.hours=+hours.toFixed(2);
  const idx=all.findIndex(a=>a.opId===opId&&a.date===date&&a.cc===cc());
  if(idx>-1)Object.assign(all[idx],{...entry,updatedAt:nowISO()});
  else all.push({id:uid(),opId,date,...entry,cc:cc(),created:nowISO()});
  // If shift crosses midnight, add entry for next day too
  if(nextDate&&nextDayHours>0){
    const nIdx=all.findIndex(a=>a.opId===opId&&a.date===nextDate&&a.cc===cc());
    const nEntry={opId,date:nextDate,status,note:note?note+' (continued)':'Continued from prev day',shiftIn:'00:00',shiftOut:shiftOut,hours:+nextDayHours.toFixed(2),autoMarked:false,cc:cc()};
    if(nIdx>-1)Object.assign(all[nIdx],{...nEntry,updatedAt:nowISO()});
    else all.push({id:uid(),...nEntry,created:nowISO()});
    toast('Shift crossed midnight — added entry for '+fmtD(nextDate)+' too','ok');
  }
  sl('attendance',all);
  closeModal();
  const label=STATUS_NAMES[status]||status;
  toast('Marked '+label+(shiftIn&&shiftOut?' ('+shiftIn+'–'+shiftOut+(nextDate?' + next day':'')+')':''),'ok');
  goPage('attendance',{opId,year:new Date(date+'T00:00:00').getFullYear(),month:new Date(date+'T00:00:00').getMonth()},true);
}

function delAttendance(id,opId,year,month){
  if(!confirm('Delete this attendance record?'))return;
  sl('attendance',gl('attendance').filter(a=>a.id!==id));
  toast('Deleted','info');goPage('attendance',{opId,year,month},true);
}

/* ── MULTI-SELECT ENGINE ── */
const MS={sel:new Set(),mode:false,type:''};
function msToggle(type){
  if(MS.mode&&MS.type===type){MS.sel.clear();MS.mode=false;MS.type='';}
  else{MS.sel.clear();MS.mode=true;MS.type=type;}
  renderCurPage();
}
function msCheck(id,checked){if(checked)MS.sel.add(id);else MS.sel.delete(id);_msBadge();}
function _msBadge(){
  let bar=document.getElementById('ms-bar');
  if(!bar){bar=document.createElement('div');bar.id='ms-bar';bar.className='ms-bar';document.body.appendChild(bar);}
  if(MS.mode&&MS.sel.size>0){
    bar.style.display='flex';
    bar.innerHTML='<span style="font-size:.85rem;font-weight:700">'+MS.sel.size+' selected</span>'
      +'<button class="btn bD bSm" onclick="msDeleteSelected()">Delete Selected</button>'
      +'<button class="btn bG bSm" onclick="msClear()">Cancel</button>';
  } else {bar.style.display='none';}
}
function msClear(){MS.sel.clear();MS.mode=false;MS.type='';renderCurPage();const b=document.getElementById('ms-bar');if(b)b.style.display='none';}
function msDeleteSelected(){
  if(!MS.sel.size)return;
  if(!confirm('Delete '+MS.sel.size+' item(s)? This cannot be undone.'))return;
  const ids=[...MS.sel];
  const type=MS.type;
  MS.sel.clear();MS.mode=false;MS.type='';
  if(type==='maintenance'){
    const all=gl('maint');
    ids.forEach(id=>{const m=all.find(x=>x.id===id);if(m)(m.photoIds||[]).forEach(pid=>PhotoDB.del(pid).catch(()=>{}));});
    sl('maint',all.filter(m=>!ids.includes(m.id)));
  } else if(type==='expenses'){
    const all=gl('expenses');
    ids.forEach(id=>{const e=all.find(x=>x.id===id);if(e)(e.photoIds||[]).forEach(pid=>PhotoDB.del(pid).catch(()=>{}));});
    sl('expenses',all.filter(e=>!ids.includes(e.id)));
  } else if(type==='completed'){
    const all=gl('jobs');
    ids.forEach(id=>{const j=all.find(x=>x.id===id);if(j)(j.photoIds||[]).forEach(pid=>PhotoDB.del(pid).catch(()=>{}));});
    sl('jobs',all.filter(j=>!ids.includes(j.id)));
  } else if(type==='accidents'){
    const all=gl('accidents');
    ids.forEach(id=>{const a=all.find(x=>x.id===id);if(a)(a.photoIds||[]).forEach(pid=>PhotoDB.del(pid).catch(()=>{}));});
    sl('accidents',all.filter(a=>!ids.includes(a.id)));
  } else if(type==='archive'){
    sl('archive',gl('archive').filter(a=>!ids.includes(a.id)));
  } else if(type==='clients'){
    sl('clients',gl('clients').filter(cl=>!ids.includes(cl.id)));
  }
  toast('Deleted '+ids.length+' item(s)','ok');
  renderCurPage();
}

  const iiF=ii.filter(i=>{
    if(from&&i.date&&i.date<from)return false;
    if(to&&i.date&&i.date>to)return false;
    return true;
  });

  const paid=iiF.filter(i=>i.ps==='paid'&&(parseFloat(i.gst)||0)>0)
    .sort((a,b)=>new Date(b.date)-new Date(a.date));
  const unpaid=iiF.filter(i=>i.ps!=='paid'&&(parseFloat(i.gst)||0)>0)
    .sort((a,b)=>new Date(b.date)-new Date(a.date));

  const totalCollected=paid.reduce((a,i)=>a+invGSTAmt(i),0);
  const totalPending=unpaid.reduce((a,i)=>a+invGSTAmt(i),0);
  const totalGST=totalCollected+totalPending;

  // GST payments made to government
  const gstPayments=gl('gstPayments').filter(p=>p.cc===cc())
    .filter(p=>(!from||p.date>=from)&&(!to||p.date<=to))
    .sort((a,b)=>new Date(b.date)-new Date(a.date));
  const totalPaidGov=gstPayments.reduce((a,p)=>a+(+p.amt||0),0);
  const gstPayable=Math.max(0,totalCollected-totalPaidGov);

  // Group by GST rate
  const byRate={};
  [...paid,...unpaid].forEach(i=>{
    const rate=parseFloat(i.gst)||0;
    if(!byRate[rate])byRate[rate]={rate,collected:0,pending:0,count:0};
    byRate[rate].count++;
    if(i.ps==='paid')byRate[rate].collected+=invGSTAmt(i);
    else byRate[rate].pending+=invGSTAmt(i);
  });
  const rates=Object.values(byRate).sort((a,b)=>b.rate-a.rate);

  function invRow(i,isCollected){
    const j=[...gl('jobs'),...gl('ghostJobs')].find(x=>x.id===i.jid);
    const gstAmt=invGSTAmt(i);
    return`<div class="card" style="padding:.55rem .875rem;margin-bottom:.35rem;cursor:pointer" onclick="goPage('job-detail',{id:'${i.jid}'})">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:.5rem">
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:.84rem">${esc(j?.title||i.ino||'—')}</div>
          <div style="font-size:.7rem;color:var(--t2)">${esc(j?.client||'—')} · ${fmtD(i.date)} · ${esc(i.ino||'—')}</div>
          <div style="font-size:.7rem;color:var(--t2)">Base: ${fmtC(i.amt)} · GST ${i.gst}%${+i.disc>0?' · Disc: '+fmtC(+i.disc):''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-weight:800;font-size:.9rem;color:${isCollected?'#f59e0b':'var(--O)'}">+${fmtC(gstAmt)}</div>
          <span class="bdg ${isCollected?'bPaid':'bUnpaid'}" style="font-size:.58rem">${isCollected?'Collected':'Pending'}</span>
        </div>
      </div>
    </div>`;
  }

  return`<div style="padding:1rem 0">
    ${bkBtn()}
    <div class="pgHd" style="margin-bottom:.5rem">
      <h2 class="pgT" style="color:#f59e0b">🧾 GST Collection</h2>
    </div>

    <!-- Date filter -->
    <div style="display:flex;gap:.4rem;margin-bottom:.65rem">
      <div style="flex:1"><label class="fl">From</label>
        <input class="fi" type="date" value="${from}" style="margin-top:.1rem"
          onchange="setSFFilter('gstDetail','dateFrom',this.value);goPage('gstDetail',{},true)"/></div>
      <div style="flex:1"><label class="fl">To</label>
        <input class="fi" type="date" value="${to}" style="margin-top:.1rem"
          onchange="setSFFilter('gstDetail','dateTo',this.value);goPage('gstDetail',{},true)"/></div>
    </div>
    ${from||to?`<button class="btn bG bSm" style="margin-bottom:.6rem" onclick="clearSF('gstDetail');goPage('gstDetail',{},true)">✕ Clear Filter</button>`:''}

    <!-- Summary grid -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin-bottom:.7rem">
      <div style="background:rgba(245,158,11,.12);border:1.5px solid rgba(245,158,11,.3);border-radius:var(--r12);padding:.7rem;text-align:center">
        <div style="font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:#f59e0b;margin-bottom:.15rem">GST Collected</div>
        <div style="font-family:var(--fd);font-size:1.25rem;font-weight:800;color:#f59e0b">${fmtC(totalCollected)}</div>
        <div style="font-size:.67rem;color:var(--t2)">${paid.length} invoice${paid.length!==1?'s':''}</div>
      </div>
      <div style="background:var(--Obg);border:1.5px solid rgba(249,115,22,.3);border-radius:var(--r12);padding:.7rem;text-align:center">
        <div style="font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:var(--O);margin-bottom:.15rem">GST Pending</div>
        <div style="font-family:var(--fd);font-size:1.25rem;font-weight:800;color:var(--O)">${fmtC(totalPending)}</div>
        <div style="font-size:.67rem;color:var(--t2)">${unpaid.length} invoice${unpaid.length!==1?'s':''}</div>
      </div>
      <div style="background:var(--Gbg);border:1.5px solid rgba(34,197,94,.25);border-radius:var(--r12);padding:.7rem;text-align:center">
        <div style="font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:var(--G);margin-bottom:.15rem">Paid to Govt</div>
        <div style="font-family:var(--fd);font-size:1.25rem;font-weight:800;color:var(--G)">${fmtC(totalPaidGov)}</div>
        <div style="font-size:.67rem;color:var(--t2)">${gstPayments.length} payment${gstPayments.length!==1?'s':''}</div>
      </div>
      <div style="background:${gstPayable>0?'var(--Rbg)':'var(--Gbg)'};border:1.5px solid ${gstPayable>0?'rgba(239,68,68,.25)':'rgba(34,197,94,.25)'};border-radius:var(--r12);padding:.7rem;text-align:center">
        <div style="font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:var(--${gstPayable>0?'R':'G'});margin-bottom:.15rem">Balance Due</div>
        <div style="font-family:var(--fd);font-size:1.25rem;font-weight:800;color:var(--${gstPayable>0?'R':'G'})">${fmtC(gstPayable)}</div>
        <div style="font-size:.67rem;color:var(--t2)">${gstPayable>0?'To be paid':'All clear ✓'}</div>
      </div>
    </div>

    <!-- Pay GST to Government button -->
    ${totalCollected>0?`<div class="card" style="margin-bottom:.75rem;border-color:rgba(34,197,94,.3)">
      <div class="sTitle" style="margin-bottom:.4rem;color:var(--G)">💸 Pay GST to Government</div>
      <div style="font-size:.78rem;color:var(--t2);margin-bottom:.5rem">Balance due: <strong style="color:var(--${gstPayable>0?'R':'G'})">${fmtC(gstPayable)}</strong></div>
      <div style="display:flex;gap:.4rem;margin-bottom:.4rem">
        <div style="flex:1"><label class="fl">Date</label><input class="fi" id="gstPayDate" type="date" value="${tod()}" style="margin-top:.1rem"/></div>
        <div style="flex:1"><label class="fl">Amount</label><input class="fi" id="gstPayAmt" type="number" placeholder="${gstPayable.toFixed(0)}" style="margin-top:.1rem"/></div>
      </div>
      <div class="fg" style="margin-bottom:.5rem"><label class="fl">Note (optional)</label>
        <input class="fi" id="gstPayNote" placeholder="e.g. GSTIN payment, period Q1 2026"/></div>
      <button class="btn bOk bFull" onclick="recordGSTPayment()">✓ Record GST Payment</button>
    </div>`:''}

    <!-- GST Payments history -->
    ${gstPayments.length?`<div class="card" style="margin-bottom:.75rem">
      <div class="sTitle" style="margin-bottom:.4rem;color:var(--G)">✅ Paid to Government</div>
      ${gstPayments.map(p=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--b1)">
        <div>
          <div style="font-weight:600;font-size:.84rem">${fmtC(p.amt)}</div>
          <div style="font-size:.7rem;color:var(--t2)">${fmtD(p.date)}${p.note?' · '+esc(p.note):''}</div>
        </div>
        <button class="btn bD bSm" onclick="delGSTPayment('${p.id}')">✕</button>
      </div>`).join('')}
    </div>`:''}

    <!-- Rate breakdown -->
    ${rates.length>1?`<div class="card" style="margin-bottom:.75rem">
      <div class="sTitle" style="margin-bottom:.4rem">By GST Rate</div>
      ${rates.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--b1)">
        <div><div style="font-weight:700;color:#f59e0b">${r.rate}% GST</div>
          <div style="font-size:.7rem;color:var(--t2)">${r.count} invoice${r.count!==1?'s':''}</div></div>
        <div style="text-align:right">
          ${r.collected>0?`<div style="font-size:.8rem;font-weight:700;color:#f59e0b">Collected: ${fmtC(r.collected)}</div>`:''}
          ${r.pending>0?`<div style="font-size:.8rem;color:var(--O)">Pending: ${fmtC(r.pending)}</div>`:''}
        </div>
      </div>`).join('')}
    </div>`:''}

    <!-- Invoice lists -->
    ${paid.length?`<div style="margin-bottom:.75rem">
      <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#f59e0b;margin-bottom:.4rem">✅ GST Collected (${paid.length})</div>
      ${paid.map(i=>invRow(i,true)).join('')}
    </div>`:''}
    ${unpaid.length?`<div style="margin-bottom:.75rem">
      <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--O);margin-bottom:.4rem">⏳ GST Pending (${unpaid.length})</div>
      ${unpaid.map(i=>invRow(i,false)).join('')}
    </div>`:''}
    ${!paid.length&&!unpaid.length?empty('No GST Data','No invoices with GST found for this period.'):''}
  </div>`;
}

function recordGSTPayment(){
  const amt=parseFloat(document.getElementById('gstPayAmt')?.value)||0;
  const date=document.getElementById('gstPayDate')?.value||tod();
  const note=document.getElementById('gstPayNote')?.value||'';
  if(!amt||amt<=0)return toast('Enter a valid amount','err');
  const all=gl('gstPayments');
  all.push({id:uid(),amt:String(amt),date,note,cc:cc(),created:nowISO()});
  sl('gstPayments',all);
  toast('GST payment of '+fmtC(amt)+' recorded','ok');
  goPage('gstDetail',{},true);
}
function delGSTPayment(id){
  if(!confirm('Delete this GST payment record?'))return;
  sl('gstPayments',gl('gstPayments').filter(p=>p.id!==id));
  toast('Deleted','info');
  goPage('gstDetail',{},true);
}

/* ── ANDROID HARDWARE BACK BUTTON ── */
document.addEventListener('backbutton', function(e){
  e.preventDefault();
  if($('mbg')?.classList.contains('on')){closeMBGClick();return;}
  if($('subnav')?.classList.contains('on')){closeSN();return;}
  if($('profDrop')?.classList.contains('on')){togProf();return;}
  if(NH.length > 0){goBack();return;}
  // If at root, minimize app (don't exit)
  if(navigator.app?.exitApp) navigator.app.exitApp();
}, false);

/* ── FIX: Prevent blank screen on back-navigation (bfcache) ── */
window.addEventListener('pageshow', function(e){
  if(e.persisted && CU){
    // Page restored from bfcache (common in WebView)
    updateTopbar();updateBnav();
    if(!$('app').classList.contains('on')){
      $('auth').style.display='none';
      $('app').classList.add('on');
    }
  }
});

</script>
</body>
</html>
